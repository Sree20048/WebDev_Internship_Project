<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Web Development Project</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<!-- IMPORTANT: ADD CLASS -->
<body class="contact">

    <!-- Navigation Bar -->
    <header>
        <nav class="navbar">
            <div class="logo">My Internship Project</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="todo.html">To-Do List</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contact Section -->
   <section class="contact-section">
    <h2 class="title">Get in Touch</h2>

    <form id="contactForm">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="message">Message:</label>
        <textarea id="message" rows="4" placeholder="Enter your message" required></textarea>

        <button type="submit">Send Message</button>
    </form>
</section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Web Development Internship Project</p>
    </footer>

    <!-- JavaScript -->
    <script src="js/script.js"></script>

</body>
</html>
